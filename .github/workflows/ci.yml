# Source of truth: dome-docs/templates/ci-python.yml (adapted for dome-auth).
# dome-auth is backend-only with no backend/ subdirectory prefix.

name: ci

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements*.txt
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Verify lock files are up to date
        run: |
          uv pip compile requirements.in -o /tmp/req.txt --python-version 3.12
          tail -n +3 requirements.txt > /tmp/req-local.txt
          tail -n +3 /tmp/req.txt > /tmp/req-ci.txt
          diff /tmp/req-local.txt /tmp/req-ci.txt
          uv pip compile requirements-dev.in -o /tmp/req-dev.txt --python-version 3.12
          tail -n +3 requirements-dev.txt > /tmp/req-dev-local.txt
          tail -n +3 /tmp/req-dev.txt > /tmp/req-dev-ci.txt
          diff /tmp/req-dev-local.txt /tmp/req-dev-ci.txt
      - name: Lint (ruff check)
        run: ruff check .
      - name: Format check (ruff format)
        run: ruff format --check .
      - name: Type check (mypy)
        run: mypy .
      - name: Tests (pytest)
        run: pytest
      - name: Security audit (pip-audit)
        # DA-007: scan the pinned production lock for known CVEs. --no-deps audits
        # exactly the compiled-pinned versions. Dev deps are watched by Dependabot,
        # not gated here. uvx is provided by astral-sh/setup-uv above.
        #
        # TEMPORARY --ignore-vuln list: starlette CVEs cleared only by the fastapi
        # 0.115 -> 0.136 upgrade (sequenced as its own follow-up), plus python-dotenv
        # CVE-2026-28684 (fix 1.2.2) riding the same follow-up. Remove once bumped.
        #   starlette PYSEC-2026-161 (1.0.1), CVE-2024-47874 (0.40.0),
        #             CVE-2025-54121 (0.47.2), CVE-2025-62727 (0.49.1)
        #   python-dotenv CVE-2026-28684 (1.2.2)
        run: >-
          uvx pip-audit --no-deps -r requirements.txt
          --ignore-vuln PYSEC-2026-161
          --ignore-vuln CVE-2024-47874
          --ignore-vuln CVE-2025-54121
          --ignore-vuln CVE-2025-62727
          --ignore-vuln CVE-2026-28684

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image (no push)
        run: docker build -t ci-build .
