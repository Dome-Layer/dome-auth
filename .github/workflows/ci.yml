# Source of truth: dome-docs/templates/ci-python.yml (adapted for dome-auth).
# dome-auth is backend-only with no backend/ subdirectory prefix.

name: ci

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements*.txt
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Verify lock files are up to date
        run: |
          uv pip compile requirements.in -o /tmp/req.txt --python-version 3.12
          tail -n +3 requirements.txt > /tmp/req-local.txt
          tail -n +3 /tmp/req.txt > /tmp/req-ci.txt
          diff /tmp/req-local.txt /tmp/req-ci.txt
          uv pip compile requirements-dev.in -o /tmp/req-dev.txt --python-version 3.12
          tail -n +3 requirements-dev.txt > /tmp/req-dev-local.txt
          tail -n +3 /tmp/req-dev.txt > /tmp/req-dev-ci.txt
          diff /tmp/req-dev-local.txt /tmp/req-dev-ci.txt
      - name: Lint (ruff check)
        run: ruff check .
      - name: Format check (ruff format)
        run: ruff format --check .
      - name: Type check (mypy)
        run: mypy .
      - name: Tests (pytest)
        run: pytest
